name: 24/7 Quad-Stream (Final Stable Fix)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

env:
  # Node 20 ki warning hatane ke liye
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Check Media Files
        run: |
          if [ ! -f "video5.mp4" ] || [ ! -f "audio5.mp3" ]; then 
            echo "Error: Files missing!" 
            exit 1
          fi

      - name: Start 4 Live Streams
        env:
          S1: ${{ secrets.STREAM_1_URL }}
          S2: ${{ secrets.STREAM_2_URL }}
          S3: ${{ secrets.STREAM_3_URL }}
          S4: ${{ secrets.STREAM_4_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Starting 4 parallel streams (No heavy filters for stability)..."

          # Stable Command: Bina complex filter ke taaki 5:50 hrs tak chale
          FF_CMD="-re -stream_loop -1 -i video5.mp4 -stream_loop -1 -i audio5.mp3 \
          -map 0:v:0 -map 1:a:0 -c:v libx264 -preset ultrafast -tune zerolatency \
          -pix_fmt yuv420p -b:v 1500k -c:a aac -b:a 128k -t 05:50:00 -f flv"

          # Charo streams start ho rahi hain
          ffmpeg $FF_CMD "$S1" &
          ffmpeg $FF_CMD "$S2" &
          ffmpeg $FF_CMD "$S3" &
          ffmpeg $FF_CMD "$S4" &

          # Wait command yahan process ko rok kar rakhega
          wait

          echo "Stream finished normally. Re-triggering..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "restart_stream"}'
