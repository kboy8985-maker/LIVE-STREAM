name: 24/7 Quad-Stream (Node 24 Fix & Optimized Reverse)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

env:
  # Node.js 20 ki warning ko khatam karne ke liye
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Check Media Files
        run: |
          # Check for video5.mp4 and audio5.mp3
          if [ ! -f "video5.mp4" ] || [ ! -f "audio5.mp3" ]; then 
            echo "Error: video.mp4 or audio.mp3 missing!" 
            exit 1
          fi

      - name: Start 4 Live Streams
        env:
          S1: ${{ secrets.STREAM_1_URL }}
          S2: ${{ secrets.STREAM_2_URL }}
          S3: ${{ secrets.STREAM_3_URL }}
          S4: ${{ secrets.STREAM_4_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Starting 4 parallel streams with Loop + Reverse (Optimized)..."

          # [0:v]reverse filter RAM consume karta hai, isliye bitrate thoda kam rakha hai 
          # taaki 4 parallel streams crash na hon.
          FF_CMD="-re -stream_loop -1 -i video.mp4 -stream_loop -1 -i audio.mp3 \
          -filter_complex '[0:v]reverse[r];[0:v][r]concat=n=2:v=1:a=0[v]' \
          -map '[v]' -map 1:a:0 -c:v libx264 -preset ultrafast -tune zerolatency \
          -b:v 1200k -c:a aac -b:a 128k -t 05:45:00 -f flv"

          # 4 parallel streams
          ffmpeg $FF_CMD "$S1" &
          ffmpeg $FF_CMD "$S2" &
          ffmpeg $FF_CMD "$S3" &
          ffmpeg $FF_CMD "$S4" &

          wait

          echo "All streams finished. Re-triggering..."
          curl -X POST -H "Authorization: token $GH_TOKEN" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ github.repository }}/dispatches \
          -d '{"event_type": "restart_stream"}'
