name: 24/7 Quad-Stream (Public Repo)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [restart_stream]

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 355 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt update
          sudo apt install -y ffmpeg

      - name: Check Media Files
        run: |
          # Sirf 2 set of files check karein
          if [ ! -f "video1.mp4" ] || [ ! -f "audio1.mp3" ]; then echo "Set 1 missing!" && exit 1; fi
          if [ ! -f "video2.mp4" ] || [ ! -f "audio2.mp3" ]; then echo "Set 2 missing!" && exit 1; fi

      - name: Start 4 Live Streams
        env:
          # Charo stream keys ko secrets mein set karein
          S1: ${{ secrets.STREAM_1_URL }}
          S2: ${{ secrets.STREAM_2_URL }}
          S3: ${{ secrets.STREAM_3_URL }}
          S4: ${{ secrets.STREAM_4_URL }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Starting 4 parallel streams for 5:50:00..."

          # Stream 1 (Using Set 1)
          ffmpeg -re -stream_loop -1 -i video1.mp4 -stream_loop -1 -i audio1.mp3 -map 0:v:0 -map 1:a:0 -c:v libx264 -preset ultrafast -b:v 1500k -c:a aac -b:a 128k -t 05:50:00 -f flv "$S1" &

          # Stream 2 (Using Set 1)
          ffmpeg -re -stream_loop -1 -i video1.mp4 -stream_loop -1 -i audio1.mp3 -map 0:v:0 -map 1:a:0 -c:v libx264 -preset ultrafast -b:v 1500k -c:a aac -b:a 128k -t 05:50:00 -f flv "$S2" &

          # Stream 3 (Using Set 2)
          ffmpeg -re -stream_loop -1 -i video2.mp4 -stream_loop -1 -i audio2.mp3 -map 0:v:0 -map 1:a:0 -c:v libx264 -preset ultrafast -b:v 1500k -c:a aac -b:a 128k -t 05:50:00 -f flv "$S3" &

          # Stream 4 (Using Set 2)
          ffmpeg -re -stream_loop -1 -i video2.mp4 -stream_loop -1 -i audio2.mp3 -map 0:v:0 -map 1:a:0 -c:v libx264 -preset ultrafast -b:v 1500k -c:a aac -b:a 128k -t 05:50:00 -f flv "$S4" &

          wait

          echo "All 4 streams finished. Re-triggering..."
          curl -X POST -H "Authorization: token $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" https://api.github.com/repos/${{ github.repository }}/dispatches -d '{"event_type": "restart_stream"}'
          
